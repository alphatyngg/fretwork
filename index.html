<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Fretwork - Guitar Practice Companion</title>

        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div class="page">
            <header>
                <h1>Fretwork</h1>
                <p>Guitar Practice Companion</p>
            </header>
            
            <section class="panel">
                <h2>Scale &amp; Root </h2>
                <div class="controls-grid">
                    <div>
                        <div class="field">
                            <label>Root note</label>
                            <div class="root-picker" id="rootPicker" role="group" aria-label="Root note">
                                <button class="chip" aria-pressed="true">C</button>
                                <button class="chip" aria-pressed="false">C#</button>
                                <button class="chip" aria-pressed="false">D</button>
                                <button class="chip" aria-pressed="false">D#</button>
                                <button class="chip" aria-pressed="false">E</button>
                                <button class="chip" aria-pressed="false">F</button>
                                <button class="chip" aria-pressed="false">F#</button>
                                <button class="chip" aria-pressed="false">G</button>
                                <button class="chip" aria-pressed="false">G#</button>
                                <button class="chip" aria-pressed="false">A</button>
                                <button class="chip" aria-pressed="false">A#</button>
                                <button class="chip" aria-pressed="false">B</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="field">
                            <label for="scaleSelect">Scale / mode</label>
                            <div class="select-wrap">
                                <select id="scaleSelect">
                                    <option value="major">Major</option>
                                    <option value="minor">Natural Minor</option>
                                    <option value="major_pentatonic">Major Pentatonic</option>
                                    <option value="minor_pentatonic">Minor Pentatonic</option>
                                    <option value="blues">Blues</option>
                                    <option value="dorian">Dorian</option>
                                    <option value="mixolydian">Mixolydian</option>
                                </select>
                            </div>
                        </div>

                        <div class="field">
                            <label>Fretboard labels</label>
                            <div class="segmented" id="labelMode" role="group" aria-label="Label mode">
                                <button data-mode="name" aria-pressed="true">Notes</button>
                                <button data-mode="degree" aria-pressed="false">Degrees</button>
                                <button data-mode="interval" aria-pressed="false">Intervals</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>Fretboard</h2>
                <div class="fretboard-wrap">
                    <svg id="fretboard" width="830" height="210"></svg>
                </div>
            </section>

            <section class="panel">
                <h2>Metronome</h2>
                <div class="metronome-body">
                    <div class="tempo-readout">
                        <div class="bpm-value" id="bpmValue">100</div>
                        <div class="tempo-name" id="tempoName">Andante</div>
                        <div class="bpm-label">BEATS / MIN</div>
                        <div class="tempo-adjust">
                            <button class="step-btn" id="bpmDown" aria-label="Decrease tempo">&minus;</button>
                            <input type="range" id="bpmSlider" min="30" max="240" value="100" />
                            <button class="step-btn" id="bpmUp" aria-label="Increase tempo">&plus;</button>
                        </div>
                    </div>

                    <div class="transport">
                        <div class="transport-buttons">
                            <button id="playToggle" aria-pressed="false">Start</button>
                            <button class="tap-btn" id="tapTempo">Tap Tempo</button>
                        </div>
                        <div class="beat-leds" id="beatLeds"></div>
                    </div>

                    <div class="meter-select">
                        <label for="meterSelect">Beats / Bar</label>
                        <div class="select-wrap">
                            <select id="meterSelect">
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4" selected>4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <script src="script.js"></script>
    </body>

</html>
